# ─────────────────────────────────────────────────────────────────────────────
# nginx/nginx.conf — WhaleTracker Production Reverse Proxy
#
# Yer tutucular (değiştir):
#   YOUR_DOMAIN.com  →  gerçek domain adın
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP: her şeyi HTTPS'e yönlendir ─────────────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

    # Let's Encrypt ACME challenge (Certbot'un ihtiyacı)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: ana sunucu ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

    # SSL sertifikaları (Certbot tarafından oluşturulur)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.com/privkey.pem;

    # Modern TLS yapılandırması
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Güvenlik başlıkları ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-XSS-Protection          "1; mode=block"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"      always;

    # ── Dosya yükleme limiti ─────────────────────────────────────────────────
    client_max_body_size 10M;

    # ── Backend API: /api/* ve /docs, /openapi.json ──────────────────────────
    location ~ ^/(api|auth|trades|users|ai|news|analytics|watchlist|whale|proxy|uploads|chat|stripe|api-keys|profile|mobile)(/|$) {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── WebSocket: /ws/* ─────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass             http://backend:8000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_set_header       X-Real-IP  $remote_addr;
        proxy_read_timeout     3600s;   # WebSocket bağlantısı uzun yaşar
        proxy_send_timeout     3600s;
    }

    # ── FastAPI dokümantasyonu (isteğe bağlı — production'da kapatabilirsin) ─
    location ~ ^/(docs|redoc|openapi.json)$ {
        proxy_pass       http://backend:8000;
        proxy_set_header Host $host;
    }

    # ── Frontend (React static build) ────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # SPA routing: 404'leri index.html'e gönder
        proxy_intercept_errors on;
        error_page 404 = @fallback;
    }

    location @fallback {
        proxy_pass http://frontend:80;
    }
}
