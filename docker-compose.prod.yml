# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.prod.yml — WhaleTracker Production
#
# Kullanım:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Gereksinimler:
#   - backend/.env.production dosyası dolu olmalı (şablonu: backend/.env.production.example)
#   - SSL sertifikaları /etc/letsencrypt altında hazır olmalı (Certbot ile al)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── 0. PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: wt_prod_postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-whaletracker}
      POSTGRES_USER:     ${POSTGRES_USER:-whale}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}         # .env.production'dan gelir
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ÖNEMLİ: Dışarıya port açılmıyor — sadece iç ağda erişilebilir
    expose:
      - "5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-whale} -d ${POSTGRES_DB:-whaletracker}"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── 1. Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wt_prod_redis
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    expose:
      - "6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── 2. Backend (FastAPI) ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wt_prod_backend
    expose:
      - "8000"
    # Production'da kaynak kod volume mount YOK — image içindeki kod çalışır
    env_file:
      - ./backend/.env.production
    environment:
      ENVIRONMENT: production
    command: >
      sh -c "alembic upgrade head &&
             gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 120"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: always

  # ── 3. Celery Worker ─────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wt_prod_celery
    env_file:
      - ./backend/.env.production
    environment:
      ENVIRONMENT: production
    command: >
      celery -A celery_app worker
      --loglevel=warning
      --concurrency=2
      -Q default,whale_alerts,ai_tasks
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: always

  # ── 3.5 Celery Beat ──────────────────────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wt_prod_celery_beat
    env_file:
      - ./backend/.env.production
    environment:
      ENVIRONMENT: production
    command: celery -A celery_app beat --loglevel=warning
    depends_on:
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started
    restart: always

  # ── 4. Frontend (static build) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
        REACT_APP_GOOGLE_CLIENT_ID: ${REACT_APP_GOOGLE_CLIENT_ID:-}
        REACT_APP_POSTHOG_KEY: ${REACT_APP_POSTHOG_KEY:-}
        REACT_APP_POSTHOG_HOST: ${REACT_APP_POSTHOG_HOST:-https://app.posthog.com}    container_name: wt_prod_frontend
    expose:
      - "80"
    restart: always

  # ── 5. Nginx (reverse proxy + SSL) ───────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: wt_prod_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  postgres_data:
