<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00d4ff"/>
      <stop offset="50%"  stop-color="#7b2fff"/>
      <stop offset="100%" stop-color="#cc00ff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="6" fill="#0a0f1e"/>
  <g stroke="url(#fg)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)">
    <!-- Balina gövdesi -->
    <path d="M 7,16 C 7,10 10,7 16,7 C 22,7 25,10 25,16 C 25,22 22,25 16,25 C 10,25 7,22 7,16 Z"/>
    <!-- Kuyruk fin -->
    <path d="M 23,22 C 25,25 27,26.5 28,25.5 C 27,24 26.5,22 26.5,20"/>
    <path d="M 23,22 C 25.5,24 28.5,22.5 29,20 C 27.5,19.5 25.5,20.5 24.5,20"/>
    <!-- Göz -->
    <circle cx="21" cy="13" r="1.2" stroke-width="1.2"/>
    <!-- Sinyal yayları -->
    <path d="M 9,5.5 A 9.5,9.5 0 0 1 23,5.5" stroke-width="1.1" opacity="0.85"/>
    <path d="M 11,3.5 A 12,12 0 0 1 21,3.5" stroke-width="0.8" opacity="0.55"/>
  </g>
</svg>
